name: AntaSpa - Registro de Actividad

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Obtener archivos modificados
        id: changes
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar registro completo a Discord
        run: |
          MESSAGE="📌 REGISTRO DE ACTIVIDAD ANTA SPA

👤 Responsable: ${{ github.actor }}
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
📌 Evento: ${{ github.event_name }}
🌿 Rama: ${{ github.ref_name }}
📦 Repositorio: ${{ github.repository }}

📝 Mensaje:
${{ github.event.head_commit.message }}

📄 Archivos afectados:
${{ steps.changes.outputs.files }}

🔗 Link commit/acción:
${{ github.event.head_commit.url }}

📊 Tipo de cambio: seguimiento automático de proyecto UX/UI Figma"

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
