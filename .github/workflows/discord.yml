name: AntaSpa - Registro de Actividad Inteligente

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Detectar archivos modificados
        id: files
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
          else
            FILES="No disponible para este evento"
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Construir mensaje inteligente
        id: msg
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            MESSAGE="📌 PUSH REGISTRADO

👤 Responsable: ${{ github.actor }}
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
🌿 Rama: ${{ github.ref_name }}
📦 Repo: ${{ github.repository }}

📝 Commit:
${{ github.event.head_commit.message }}

📄 Archivos:
${{ steps.files.outputs.files }}

🔗 Link:
${{ github.event.head_commit.url }}"

          elif [ "$EVENT" = "pull_request" ]; then
            MESSAGE="📌 PULL REQUEST

👤 Autor: ${{ github.actor }}
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
🌿 Rama: ${{ github.head_ref }} → ${{ github.base_ref }}
📦 Repo: ${{ github.repository }}

📝 Título:
${{ github.event.pull_request.title }}

📄 Descripción:
${{ github.event.pull_request.body }}

🔗 PR:
${{ github.event.pull_request.html_url }}"

          else
            MESSAGE="📌 EVENTO DETECTADO

👤 Usuario: ${{ github.actor }}
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
📌 Evento: ${{ github.event_name }}
🌿 Rama: ${{ github.ref_name }}
📦 Repo: ${{ github.repository }}

🧠 Detalle:
Evento de creación o acción sin commit directo"
          fi

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar a Discord (ESTABLE)
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"${{ steps.msg.outputs.message }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
