name: AntaSpa Bot Discord

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Detectar archivos modificados
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "No disponible")
          else
            FILES="No disponible para este evento"
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Construir mensaje
        id: msg
        run: |
          EVENT="${{ github.event_name }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          if [ "$EVENT" = "push" ]; then
            DETAIL=$(git log -1 --pretty=%B | head -c 300)

            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

━━━━━━━━━━━━━━━━━━━━━━
👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}
🌿 Rama: ${{ github.ref_name }}
━━━━━━━━━━━━━━━━━━━━━━
🚀 EVENTO: PUSH

🧠 Commit:
$DETAIL

📄 Archivos:
${{ steps.changes.outputs.files }}

━━━━━━━━━━━━━━━━━━━━━━
🔗 Link: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          elif [ "$EVENT" = "pull_request" ]; then
            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

━━━━━━━━━━━━━━━━━━━━━━
👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}
🌿 Rama: PR ${{ github.head_ref }} → ${{ github.base_ref }}
━━━━━━━━━━━━━━━━━━━━━━
🔀 EVENTO: PULL REQUEST

📝 Título:
${{ github.event.pull_request.title }}

📄 Descripción:
${{ github.event.pull_request.body }}

━━━━━━━━━━━━━━━━━━━━━━
🔗 PR: ${{ github.event.pull_request.html_url }}"

          else
            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

━━━━━━━━━━━━━━━━━━━━━━
👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}
🌿 Rama: ${{ github.ref_name }}
━━━━━━━━━━━━━━━━━━━━━━
📌 EVENTO: $EVENT

🧠 Actividad registrada sin commit directo"
          fi

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar a Discord
        run: |
          MESSAGE="${{ steps.msg.outputs.message }}"

          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{content: $content}')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$PAYLOAD" \
          ${{ secrets.DISCORD_WEBHOOK }}
