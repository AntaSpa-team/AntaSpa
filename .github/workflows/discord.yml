name: AntaSpa - Registro de Actividad

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2


      - name: Obtener archivos modificados
        id: changes
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD^ HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar registro completo a Discord
        run: |

          curl \
          -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"📌 **REGISTRO DE ACTIVIDAD ANTA SPA**\n\n\
👤 Responsable: ${{ github.actor }}\n\
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')\n\
📌 Evento: ${{ github.event_name }}\n\
🌿 Rama: ${{ github.ref_name }}\n\
📦 Repositorio: ${{ github.repository }}\n\n\
📝 Mensaje:\n${{ github.event.head_commit.message }}\n\n\
📄 Archivos afectados:\n${{ steps.changes.outputs.files }}\n\n\
🔗 Link commit/acción:\n${{ github.event.head_commit.url }}\n\n\
📊 Tipo de cambio: seguimiento automático de proyecto UX/UI Figma\"}" \
          ${{ secrets.DISCORD_WEBHOOK }} no fuinciona, hice push y nada q notifica
