name: AntaSpa Bot Discord

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Construir y enviar mensaje a Discord
        run: |
          EVENT="${{ github.event_name }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          if [ "$EVENT" = "push" ]; then
            DETAIL=$(git log -1 --pretty=%B | head -c 300)
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "No disponible")

            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}
🌿 Rama: ${{ github.ref_name }}

🚀 EVENTO: PUSH

🧠 Commit:
$DETAIL

📄 Archivos:
$FILES

🔗 Link:
https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          elif [ "$EVENT" = "pull_request" ]; then

            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}

🔀 EVENTO: PULL REQUEST
🌿 ${{ github.head_ref }} → ${{ github.base_ref }}

📝 Título:
${{ github.event.pull_request.title }}

📄 Descripción:
${{ github.event.pull_request.body }}

🔗 PR:
${{ github.event.pull_request.html_url }}"

          else

            MESSAGE="📊 ANTASPA • ACTIVITY SYSTEM

👤 Usuario: ${{ github.actor }}
📅 Fecha: $DATE
📦 Repo: ${{ github.repository }}

📌 EVENTO: $EVENT
🧠 Actividad registrada sin commit directo"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$(jq -n --arg content "$MESSAGE" '{content:$content}')" \
          ${{ secrets.DISCORD_WEBHOOK }}
