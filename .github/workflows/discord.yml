name: AntaSpa - Registro de Actividad

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Obtener archivos modificados
        id: changes
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar a Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"📌 **REGISTRO ANTA SPA**\n\n👤 Usuario: ${{ github.actor }}\n📅 Fecha: $(date -u)\n📌 Evento: ${{ github.event_name }}\n🌿 Rama: ${{ github.ref_name }}\n📦 Repo: ${{ github.repository }}\n\n📝 Commit: ${{ github.event.head_commit.message }}\n\n📄 Archivos:\n${{ steps.changes.outputs.files }}\n\n🔗 Link: ${{ github.event.head_commit.url }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
