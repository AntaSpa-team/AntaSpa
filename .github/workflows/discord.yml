name: AntaSpa - Registro de Actividad

on:
  push:
  pull_request:
    types: [opened, closed]
  create:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Obtener archivos modificados
        id: changes
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Construir mensaje
        id: msg
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "📌 REGISTRO DE ACTIVIDAD ANTA SPA

👤 Responsable: ${{ github.actor }}
📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
📌 Evento: ${{ github.event_name }}
🌿 Rama: ${{ github.ref_name }}
📦 Repo: ${{ github.repository }}

📝 Mensaje:
${{ github.event.head_commit.message }}

📄 Archivos:
${{ steps.changes.outputs.files }}

🔗 Link:
${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Enviar a Discord (ESTABLE)
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"${{ steps.msg.outputs.message }}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"
